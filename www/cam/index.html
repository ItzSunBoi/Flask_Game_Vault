<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var key = 'urlmask:' + location.pathname;
  var token = sessionStorage.getItem(key);
  if (!token) {
    token = Math.random().toString(36).substr(2,10);
    sessionStorage.setItem(key, token);
  }
  // Keep gameTokenMap updated so /x/ redirects work too
  try {
    var map = JSON.parse(sessionStorage.getItem('gameTokenMap') || '{}');
    map[token] = location.pathname + location.search;
    sessionStorage.setItem('gameTokenMap', JSON.stringify(map));
  } catch(e) {}
  // Only rewrite if not already on /x/
  if (location.pathname !== '/x/') {
    history.replaceState(null, '', '/x/?t=' + token);
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
<meta name="theme-color" content="#000000">
<title>Cam</title>
<style>
  :root {
    --green: #00ff88;
    --dim:   rgba(0,255,136,0.18);
    --bg:    #000;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%; background:#000; overflow:hidden;
    font-family: 'Courier New', monospace;
    user-select:none; -webkit-user-select:none;
  }

  /* ─── Feed ──────────────────────────────────────────── */
  #feed-wrap {
    position:fixed; inset:0; display:flex;
    align-items:center; justify-content:center;
    background:#000;
  }
  #cam-img {
    width:100%; height:100%; object-fit:contain;
    display:block;
    image-rendering: auto;
  }
  /* when fullscreen, stretch to fill */
  #feed-wrap.stretched #cam-img { object-fit:cover; }

  /* ─── HUD overlay ───────────────────────────────────── */
  #hud {
    position:fixed; inset:0; pointer-events:none;
    transition:opacity 0.5s;
  }
  #hud.hidden { opacity:0; }

  /* Corner scan lines - CRT feel */
  .scanlines {
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events:none;
  }

  /* Corner brackets */
  .corner {
    position:absolute; width:28px; height:28px;
    border-color:var(--green); border-style:solid; opacity:0.7;
  }
  .corner.tl { top:14px; left:14px; border-width:2px 0 0 2px; }
  .corner.tr { top:14px; right:14px; border-width:2px 2px 0 0; }
  .corner.bl { bottom:14px; left:14px; border-width:0 0 2px 2px; }
  .corner.br { bottom:14px; right:14px; border-width:0 2px 2px 0; }

  /* REC dot */
  .rec-badge {
    position:absolute; top:18px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:7px;
    font-size:11px; letter-spacing:3px; color:var(--green);
    text-transform:uppercase; opacity:0.75;
  }
  .rec-dot {
    width:8px; height:8px; border-radius:50%; background:#ff2244;
    box-shadow:0 0 6px #ff2244;
    animation:blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Timestamp */
  .timestamp {
    position:absolute; bottom:18px; right:18px;
    font-size:11px; color:var(--green); opacity:0.6; letter-spacing:2px;
  }

  /* Status top-right */
  .status-badge {
    position:absolute; top:18px; right:18px;
    font-size:10px; letter-spacing:2px; color:var(--green); opacity:0.6;
  }

  /* Latency bar */
  .latency {
    position:absolute; bottom:18px; left:18px;
    font-size:10px; color:var(--green); opacity:0.55; letter-spacing:1px;
  }

  /* ─── Controls bar ──────────────────────────────────── */
  #controls {
    position:fixed; bottom:0; left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:14px;
    padding:12px 16px 20px;
    background:linear-gradient(transparent, rgba(0,0,0,0.85));
    transition:opacity 0.5s, transform 0.5s;
    pointer-events:all;
  }
  #controls.hidden { opacity:0; transform:translateY(20px); pointer-events:none; }

  .ctrl-btn {
    background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.25);
    color:var(--green); border-radius:50%; width:52px; height:52px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:20px; transition:background .15s, transform .1s;
    backdrop-filter:blur(8px);
  }
  .ctrl-btn:active { background:rgba(0,255,136,0.22); transform:scale(0.92); }
  .ctrl-btn.wide { border-radius:26px; width:auto; padding:0 20px; gap:8px; font-size:13px; letter-spacing:1px; }
  .ctrl-btn.active { background:rgba(0,255,136,0.2); border-color:var(--green); }

  /* ─── Error / loading state ─────────────────────────── */
  #state-overlay {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px;
    background:#000; z-index:20; transition:opacity .4s;
  }
  #state-overlay.hidden { opacity:0; pointer-events:none; }
  .state-icon { font-size:48px; }
  .state-msg { color:var(--green); font-size:14px; letter-spacing:3px; text-transform:uppercase; opacity:0.8; }
  .state-sub { color:rgba(0,255,136,0.4); font-size:11px; letter-spacing:2px; text-align:center; max-width:300px; line-height:1.8; }
  .pulse-ring {
    width:80px; height:80px; border-radius:50%;
    border:2px solid rgba(0,255,136,0.3);
    animation:ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
  }
  @keyframes ping { 0%{transform:scale(0.8);opacity:1} 100%{transform:scale(1.6);opacity:0} }

  /* ─── Zoom slider ────────────────────────────────────── */
  #zoom-wrap {
    position:fixed; right:16px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
    opacity:0; transition:opacity .4s; pointer-events:none;
  }
  #zoom-wrap.show { opacity:1; pointer-events:all; }
  #zoom-slider {
    -webkit-appearance:none; appearance:none;
    writing-mode:vertical-lr; direction:rtl;
    width:4px; height:160px; background:rgba(0,255,136,0.15);
    border-radius:2px; outline:none; cursor:pointer;
  }
  #zoom-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
    background:var(--green); box-shadow:0 0 8px var(--green);
  }
  .zoom-label { font-size:10px; color:var(--green); opacity:0.6; letter-spacing:1px; }

  /* ─── Access denied ─────────────────────────────────── */
  #access-denied {
    display:none; position:fixed; inset:0; background:#000;
    align-items:center; justify-content:center; z-index:100;
    flex-direction:column; gap:16px;
  }
  #access-denied.show { display:flex; }
  #access-denied p { color:#ff2244; letter-spacing:3px; font-size:13px; text-transform:uppercase; }
  #access-denied a { color:rgba(255,255,255,0.3); font-size:11px; letter-spacing:2px; text-decoration:none; }
</style>
</head>
<body>

<!-- Access denied fallback -->
<div id="access-denied">
  <p>⛔ Access Denied</p>
  <a href="/">← Return</a>
</div>

<!-- Loading / Error state -->
<div id="state-overlay">
  <div class="pulse-ring"></div>
  <div class="state-icon">📡</div>
  <div class="state-msg" id="state-msg">Connecting</div>
  <div class="state-sub" id="state-sub">Reaching camera stream…</div>
</div>

<!-- Camera feed -->
<div id="feed-wrap">
  <img id="cam-img" src="" alt="" draggable="false">
</div>

<!-- HUD -->
<div id="hud">
  <div class="scanlines"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="rec-badge"><div class="rec-dot"></div>LIVE</div>
  <div class="timestamp" id="timestamp"></div>
  <div class="status-badge" id="status-badge">CAM 01</div>
  <div class="latency" id="latency">-- ms</div>
</div>

<!-- Controls -->
<div id="controls">
  <div class="ctrl-btn" id="btn-hud" onclick="toggleHud()" title="Toggle HUD">⬡</div>
  <div class="ctrl-btn" id="btn-zoom" onclick="toggleZoom()" title="Zoom">🔍</div>
  <div class="ctrl-btn" id="btn-stretch" onclick="toggleStretch()" title="Stretch/Fit">⛶</div>
  <div class="ctrl-btn" id="btn-fs" onclick="toggleFullscreen()" title="Fullscreen">⛶</div>
  <div class="ctrl-btn wide" id="btn-quality" onclick="cycleQuality()">
    <span>HD</span>
  </div>
  <div class="ctrl-btn" onclick="window.location='/'" title="Exit">✕</div>
</div>

<!-- Zoom slider -->
<div id="zoom-wrap">
  <div class="zoom-label">3×</div>
  <input type="range" id="zoom-slider" min="100" max="300" value="100" step="10" oninput="applyZoom(this.value)">
  <div class="zoom-label">1×</div>
</div>

<script>
// ─── Access Check ────────────────────────────────────────────────────
(function() {
  const ok = sessionStorage.getItem('camAccess') === 'granted' ||
             document.cookie.includes('camAccess=granted');
  if (!ok) {
    document.getElementById('access-denied').classList.add('show');
    document.getElementById('state-overlay').classList.add('hidden');
  }
})();

// ─── Stream Config ───────────────────────────────────────────────────
const QUALITIES = [
  { label:'SD',  path:'/camera-stream?q=low'  },
  { label:'HD',  path:'/camera-stream?q=mid'  },
  { label:'FHD', path:'/camera-stream?q=high' },
];
let qualityIdx = 1;   // default HD
let hudVisible = true;
let zoomVisible = false;
let streamStarted = null;
let latencyInterval;
let frameCount = 0;

const img      = document.getElementById('cam-img');
const stateOv  = document.getElementById('state-overlay');
const stateMsg = document.getElementById('state-msg');
const stateSub = document.getElementById('state-sub');
const controls = document.getElementById('controls');
const hud      = document.getElementById('hud');

// ─── Load stream ─────────────────────────────────────────────────────
function loadStream() {
  streamStarted = Date.now();
  const url = QUALITIES[qualityIdx].path + '&_=' + Date.now();
  setStateMsg('Connecting', 'Reaching camera stream…');

  img.onload = () => {
    stateOv.classList.add('hidden');
    document.getElementById('latency').textContent =
      (Date.now() - streamStarted) + ' ms first frame';
    frameCount++;
    startLatencyCounter();
  };
  img.onerror = () => {
    setStateMsg('No Signal', 'Camera stream unreachable.\nMake sure the camera server is running on the Pi.\nSee setup guide.');
    stateOv.classList.remove('hidden');
    img.src = '';
    setTimeout(loadStream, 4000);
  };
  img.src = url;
}

function setStateMsg(title, sub) {
  stateMsg.textContent = title;
  stateSub.textContent = sub;
}

// ─── Timestamp ───────────────────────────────────────────────────────
function updateTimestamp() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('timestamp').textContent =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
setInterval(updateTimestamp, 1000);
updateTimestamp();

// ─── Latency counter (MJPEG refreshes via img src change) ────────────
function startLatencyCounter() {
  clearInterval(latencyInterval);
  let t0 = Date.now();
  latencyInterval = setInterval(() => {
    const elapsed = Date.now() - t0;
    document.getElementById('latency').textContent = `${Math.round(elapsed/1000)}s uptime`;
  }, 1000);
}

// ─── Controls ────────────────────────────────────────────────────────
function toggleHud() {
  hudVisible = !hudVisible;
  hud.classList.toggle('hidden', !hudVisible);
  controls.classList.toggle('hidden', !hudVisible);
  document.getElementById('btn-hud').classList.toggle('active', !hudVisible);
}

function toggleZoom() {
  zoomVisible = !zoomVisible;
  document.getElementById('zoom-wrap').classList.toggle('show', zoomVisible);
  document.getElementById('btn-zoom').classList.toggle('active', zoomVisible);
}

function applyZoom(val) {
  const scale = val / 100;
  img.style.transform = `scale(${scale})`;
  img.style.transformOrigin = 'center center';
}

function toggleStretch() {
  document.getElementById('feed-wrap').classList.toggle('stretched');
  document.getElementById('btn-stretch').classList.toggle('active');
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

function cycleQuality() {
  qualityIdx = (qualityIdx + 1) % QUALITIES.length;
  document.getElementById('btn-quality').querySelector('span').textContent = QUALITIES[qualityIdx].label;
  loadStream();
}

// ─── Auto-hide controls ───────────────────────────────────────────────
let hideTimer;
function resetHideTimer() {
  clearTimeout(hideTimer);
  controls.classList.remove('hidden');
  hideTimer = setTimeout(() => {
    if (hudVisible) controls.classList.add('hidden');
  }, 4000);
}
document.addEventListener('touchstart', resetHideTimer);
document.addEventListener('mousemove', resetHideTimer);
resetHideTimer();

// ─── Pinch-to-zoom (Quest touch controllers / hand tracking) ─────────
let initDist = null;
let initScale = 1;
document.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    initDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    initScale = parseFloat(document.getElementById('zoom-slider').value) / 100;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && initDist) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    let scale = Math.min(3, Math.max(1, initScale * (dist / initDist)));
    const sliderVal = Math.round(scale * 100);
    document.getElementById('zoom-slider').value = sliderVal;
    applyZoom(sliderVal);
  }
}, { passive: true });

document.addEventListener('touchend', () => { initDist = null; }, { passive: true });

// ─── Double-tap fullscreen (Quest-friendly) ──────────────────────────
let lastTap = 0;
document.addEventListener('touchend', e => {
  if (e.touches.length > 0) return;
  const now = Date.now();
  if (now - lastTap < 280) toggleFullscreen();
  lastTap = now;
}, { passive: true });

// ─── Start ───────────────────────────────────────────────────────────
loadStream();
</script>
</body>
</html>
