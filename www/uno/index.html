<!DOCTYPE html><html lang="en"><head>
<script src="/http-socket.js"></script><script src="/multiplayer-common.js"></script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault UNO — Vault Atlas</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
<style>body{background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;margin:0}header{padding:14px 22px;border-bottom:1px solid rgba(0,255,170,.2);display:flex;gap:12px;align-items:center}.back{color:#00ffaa;text-decoration:none;font-family:'Orbitron',monospace;font-size:12px}h1{font-family:'Orbitron',monospace;font-size:18px;color:#00ffaa;letter-spacing:2px;margin:0}.panel{max-width:900px;margin:24px auto;background:#0d1426;border:1px solid rgba(0,255,170,.18);border-radius:14px;padding:16px}.card{display:inline-block;border:1px solid rgba(0,255,170,.25);padding:8px 12px;border-radius:8px;margin:5px;cursor:pointer}button{background:#00ffaa;color:#000;border:none;padding:8px 12px;border-radius:8px;font-family:'Orbitron',monospace}</style></head>
<body><header><a class="back" href="/vault">← Back</a><h1>Vault UNO</h1></header><div class="panel"><div id="top">Connecting…</div><button onclick="drawCard()">Draw</button><div id="players" style="margin:10px 0"></div><div id="hand"></div></div>
<script>const {roomId,playerName}=GameVaultMP.normalizeMultiplayerParams({defaultName:'Player'});const ws=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws');let hand=[];ws.onopen=()=>ws.send(JSON.stringify({type:'join',room:roomId,name:playerName,game:'uno'}));ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='joined'&&m.isHost)ws.send(JSON.stringify({type:'start_game'}));if(m.type==='uno_state'){hand=m.hand||[];document.getElementById('top').textContent=`Top: ${m.top} · Turn: ${((m.players||[])[m.turn]||{}).name||'-'}`;document.getElementById('players').textContent=(m.players||[]).map(p=>`${p.name} (${p.count})`).join(' · ');render();}if(m.type==='game_over')alert(`Winner: ${m.winner}`)};function drawCard(){ws.send(JSON.stringify({type:'uno_draw'}));}function render(){const h=document.getElementById('hand');h.innerHTML='';hand.forEach(c=>{const b=document.createElement('div');b.className='card';b.textContent=c;b.onclick=()=>ws.send(JSON.stringify({type:'uno_play',card:c}));h.appendChild(b);});}</script></body></html>
