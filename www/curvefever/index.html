<!DOCTYPE html><html lang="en"><head><script src="/http-socket.js"></script><script src="/multiplayer-common.js"></script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vault Curve — Vault Atlas</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet"><style>body{background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;margin:0}header{padding:14px 22px;border-bottom:1px solid rgba(0,255,170,.2);display:flex;gap:12px;align-items:center}.back{color:#00ffaa;text-decoration:none;font-family:'Orbitron',monospace;font-size:12px}h1{font-family:'Orbitron',monospace;font-size:18px;color:#00ffaa;margin:0}.panel{max-width:940px;margin:24px auto;background:#0d1426;border:1px solid rgba(0,255,170,.18);border-radius:14px;padding:16px}canvas{border:1px solid rgba(0,255,170,.25);background:#000;display:block;margin:0 auto}</style></head><body><header><a class="back" href="/vault">← Back</a><h1>Vault Curve</h1></header><div class="panel"><canvas id="cv" width="800" height="500"></canvas></div><script>const {roomId,playerName}=GameVaultMP.normalizeMultiplayerParams({defaultName:'Player'});const ws=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws');const c=document.getElementById('cv'),ctx=c.getContext('2d');let state={players:{}};let turn=0;ws.onopen=()=>ws.send(JSON.stringify({type:'join',room:roomId,name:playerName,game:'curvefever'}));ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='joined'&&m.isHost)ws.send(JSON.stringify({type:'start_game'}));if(m.type==='curve_state'){state=m;draw();if(!m.running&&m.winner)alert(`Winner: ${m.winner}`);}};document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')turn=-.2;if(e.key==='ArrowRight')turn=.2;});document.addEventListener('keyup',()=>turn=0);setInterval(()=>ws.send(JSON.stringify({type:'curve_input',turn})),50);function draw(){ctx.clearRect(0,0,800,500);Object.values(state.players||{}).forEach(p=>{ctx.strokeStyle=p.alive?'#00ffaa':'#666';ctx.beginPath();(p.trail||[]).forEach((q,i)=>{if(i===0)ctx.moveTo(q[0],q[1]);else ctx.lineTo(q[0],q[1]);});ctx.stroke();ctx.fillStyle='#fff';ctx.fillRect((p.x||0)-2,(p.y||0)-2,4,4);});}</script></body></html>
