<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var key = 'urlmask:' + location.pathname;
  var token = sessionStorage.getItem(key);
  if (!token) {
    token = Math.random().toString(36).substr(2,10);
    sessionStorage.setItem(key, token);
  }
  // Keep gameTokenMap updated so /x/ redirects work too
  try {
    var map = JSON.parse(sessionStorage.getItem('gameTokenMap') || '{}');
    map[token] = location.pathname + location.search;
    sessionStorage.setItem('gameTokenMap', JSON.stringify(map));
  } catch(e) {}
  // Only rewrite if not already on /x/
  if (location.pathname !== '/x/') {
    history.replaceState(null, '', '/x/?t=' + token);
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048 — GameVault</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100vh; }
  header { width:100%;padding:16px 24px;border-bottom:1px solid rgba(255,170,0,0.2);
    display:flex;align-items:center;gap:16px; }
  .back { color:rgba(255,170,0,0.7);text-decoration:none;font-size:13px;letter-spacing:1px;
    text-transform:uppercase;font-family:'Orbitron',monospace; }
  header h1 { font-family:'Orbitron',monospace;font-size:20px;color:#ffaa00;letter-spacing:3px; }
  .top-bar { display:flex;gap:16px;margin:20px;align-items:center; }
  .score-box { background:#0d1426;border:1px solid rgba(255,170,0,0.2);border-radius:10px;
    padding:10px 20px;text-align:center;min-width:90px; }
  .score-box .label { font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:rgba(224,240,255,0.4);font-family:'Orbitron',monospace; }
  .score-box .val { font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ffaa00; }
  .new-btn { background:#ffaa00;color:#000;border:none;padding:11px 20px;border-radius:8px;
    font-family:'Orbitron',monospace;font-size:12px;font-weight:700;cursor:pointer;
    letter-spacing:1px;text-transform:uppercase;transition:opacity .2s; }
  .new-btn:hover{opacity:.85}
  .board-wrap { position:relative;background:#1a1400;border-radius:12px;padding:10px;
    border:2px solid rgba(255,170,0,0.25);box-shadow:0 0 30px rgba(255,170,0,0.1); }
  #board { display:grid;grid-template-columns:repeat(4,1fr);gap:10px; }
  .cell {
    width:80px;height:80px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;font-family:'Orbitron',monospace;font-weight:900;
    font-size:24px;transition:transform 0.1s;
    background:#2a2000;color:rgba(255,255,255,0.15);
  }
  .cell.pop { animation:pop .12s ease; }
  @keyframes pop { 0%{transform:scale(0.8)} 60%{transform:scale(1.08)} 100%{transform:scale(1)} }
  .overlay { position:absolute;inset:0;border-radius:12px;background:rgba(5,7,0,0.85);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    backdrop-filter:blur(4px); }
  .overlay.show{display:flex}
  .overlay h2 { font-family:'Orbitron',monospace;font-size:28px;color:#ffaa00;letter-spacing:3px; }
  .overlay p { color:rgba(224,240,255,0.6);font-size:16px; }
  @media(max-width:400px){ .cell{width:68px;height:68px;font-size:18px;} }
</style>
</head>
<body>
<header>
  <a class="back" href="/games">← Back</a>
  <h1>2048</h1>
</header>
<div class="top-bar">
  <div class="score-box"><div class="label">Score</div><div class="val" id="score">0</div></div>
  <div class="score-box"><div class="label">Best</div><div class="val" id="best">0</div></div>
  <button class="new-btn" onclick="newGame()">New Game</button>
</div>
<div class="board-wrap">
  <div id="board"></div>
  <div class="overlay" id="overlay">
    <h2 id="ov-title">2048</h2>
    <p id="ov-msg">Combine tiles to reach 2048!</p>
    <button class="new-btn" onclick="newGame()">Play</button>
  </div>
</div>

<script>
const COLORS={
  0:'#2a2000',2:'#1a1800',4:'#252000',8:'#3d2600',16:'#4d2800',32:'#5d1f00',
  64:'#6b1a00',128:'#4a1a6b',256:'#3a0e7a',512:'#2a0080',1024:'#1a0055',2048:'#00a040'
};
const TEXT={0:'rgba(255,255,255,0.1)',2:'#ffd980',4:'#ffcc55',8:'#ffb030',16:'#ff9010',
  32:'#ff7000',64:'#ff5000',128:'#e040ff',256:'#c020ff',512:'#a000ff',1024:'#80aaff',2048:'#00ff88'};

let grid, score=0, best=parseInt(localStorage.getItem('2048best')||'0');

function newGame(){
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0; addTile(); addTile();
  document.getElementById('overlay').classList.remove('show');
  render();
}

function addTile(){
  const empty=[];
  grid.forEach((r,ri)=>r.forEach((v,ci)=>{if(!v)empty.push([ri,ci]);}));
  if(!empty.length)return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
  return [r,c];
}

function slide(row){
  let r=row.filter(v=>v), pts=0;
  for(let i=0;i<r.length-1;i++){
    if(r[i]===r[i+1]){r[i]*=2;pts+=r[i];r[i+1]=0;}
  }
  r=r.filter(v=>v);
  while(r.length<4)r.push(0);
  return {row:r,pts};
}

function move(dir){
  let moved=false; let pts=0;
  const ops={
    left:()=>{ for(let r=0;r<4;r++){const {row,pts:p}=slide(grid[r]);if(row.join()!==grid[r].join())moved=true;grid[r]=row;pts+=p;} },
    right:()=>{ for(let r=0;r<4;r++){const {row,pts:p}=slide([...grid[r]].reverse());const res=[...row].reverse();if(res.join()!==grid[r].join())moved=true;grid[r]=res;pts+=p;} },
    up:()=>{ for(let c=0;c<4;c++){const col=grid.map(r=>r[c]);const {row,pts:p}=slide(col);if(row.join()!==col.join())moved=true;row.forEach((v,r)=>grid[r][c]=v);pts+=p;} },
    down:()=>{ for(let c=0;c<4;c++){const col=grid.map(r=>r[c]).reverse();const {row,pts:p}=slide(col);const rev=[...row].reverse();if(rev.join()!==grid.map(r=>r[c]).join())moved=true;rev.forEach((v,r)=>grid[r][c]=v);pts+=p;} }
  };
  ops[dir](); pts && (score+=pts);
  if(moved){ addTile(); render(); checkEnd(); }
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  grid.forEach((row,ri)=>row.forEach((val,ci)=>{
    const d=document.createElement('div');
    d.className='cell'+(val?'':' empty');
    d.style.background=COLORS[Math.min(val,2048)]||'#004020';
    d.style.color=TEXT[Math.min(val,2048)]||'#00ffaa';
    d.style.fontSize=val>=1024?'18px':val>=100?'22px':'26px';
    d.textContent=val||'';
    board.appendChild(d);
  }));
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('2048best',best);}
  document.getElementById('best').textContent=best;
}

function checkEnd(){
  if(grid.some(r=>r.some(v=>v===2048))){
    setTimeout(()=>{
      document.getElementById('ov-title').textContent='YOU WIN!';
      document.getElementById('ov-msg').textContent='Score: '+score;
      document.getElementById('overlay').classList.add('show');
    },200);
    return;
  }
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(!grid[r][c])return;
    if(r<3&&grid[r][c]===grid[r+1][c])return;
    if(c<3&&grid[r][c]===grid[r][c+1])return;
  }
  setTimeout(()=>{
    document.getElementById('ov-title').textContent='GAME OVER';
    document.getElementById('ov-msg').textContent='Score: '+score;
    document.getElementById('overlay').classList.add('show');
  },200);
}

document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]){e.preventDefault();move(map[e.key]);}
});

let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

newGame();
document.getElementById('ov-title').textContent='2048';
document.getElementById('ov-msg').textContent='Combine tiles to reach 2048!';
document.getElementById('overlay').classList.add('show');
</script>
</body>
</html>
