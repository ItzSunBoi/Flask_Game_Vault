<!DOCTYPE html><html lang="en"><head><script src="/http-socket.js"></script><script src="/multiplayer-common.js"></script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vault Codenames — Vault Atlas</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet"><style>body{background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;margin:0}header{padding:14px 22px;border-bottom:1px solid rgba(0,255,170,.2);display:flex;gap:12px;align-items:center}.back{color:#00ffaa;text-decoration:none;font-family:'Orbitron',monospace;font-size:12px}h1{font-family:'Orbitron',monospace;font-size:18px;color:#00ffaa;margin:0}.panel{max-width:980px;margin:24px auto;background:#0d1426;border:1px solid rgba(0,255,170,.18);border-radius:14px;padding:16px}#grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.cell{background:#101a33;padding:14px;border-radius:8px;cursor:pointer;text-align:center}.red{outline:2px solid #ff4466}.blue{outline:2px solid #4488ff}.neutral{outline:2px solid #7d8899}.assassin{outline:2px solid #000;background:#020202}</style></head><body><header><a class="back" href="/vault">← Back</a><h1>Vault Codenames</h1></header><div class="panel"><div id="status">Connecting…</div><div id="grid"></div></div><script>const {roomId,playerName}=GameVaultMP.normalizeMultiplayerParams({defaultName:'Player'});const ws=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws');ws.onopen=()=>ws.send(JSON.stringify({type:'join',room:roomId,name:playerName,game:'codenames'}));ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='joined'&&m.isHost)ws.send(JSON.stringify({type:'start_game'}));if(m.type==='codenames_state'){document.getElementById('status').textContent='Turn: '+m.turn;const g=document.getElementById('grid');g.innerHTML='';(m.words||[]).forEach((w,i)=>{const d=document.createElement('div');const k=(m.key||[])[i];d.className='cell '+(k||'');d.textContent=w+(m.revealed?.[i]?' ✓':'');d.onclick=()=>ws.send(JSON.stringify({type:'codename_guess',index:i}));g.appendChild(d);});}if(m.type==='game_over')alert(`Winner: ${m.winner}`)};</script></body></html>
