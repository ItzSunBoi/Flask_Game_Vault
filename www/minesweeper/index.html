<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var key = 'urlmask:' + location.pathname;
  var token = sessionStorage.getItem(key);
  if (!token) {
    token = Math.random().toString(36).substr(2,10);
    sessionStorage.setItem(key, token);
  }
  // Keep gameTokenMap updated so /x/ redirects work too
  try {
    var map = JSON.parse(sessionStorage.getItem('gameTokenMap') || '{}');
    map[token] = location.pathname + location.search;
    sessionStorage.setItem('gameTokenMap', JSON.stringify(map));
  } catch(e) {}
  // Only rewrite if not already on /x/
  if (location.pathname !== '/x/') {
    history.replaceState(null, '', '/x/?t=' + token);
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Minesweeper — GameVault</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;
  display:flex;flex-direction:column;align-items:center;min-height:100vh; }
header { width:100%;padding:16px 24px;border-bottom:1px solid rgba(0,200,100,0.2);
  display:flex;align-items:center;gap:16px; }
.back { color:rgba(0,200,100,0.7);text-decoration:none;font-size:13px;letter-spacing:1px;
  text-transform:uppercase;font-family:'Orbitron',monospace; }
header h1 { font-family:'Orbitron',monospace;font-size:20px;color:#00cc66;letter-spacing:3px; }
.top-bar { display:flex;gap:12px;margin:16px;align-items:center;flex-wrap:wrap;justify-content:center; }
.info-box { background:#0d1426;border:1px solid rgba(0,200,100,0.2);border-radius:10px;
  padding:8px 16px;text-align:center;min-width:80px; }
.info-box .label { font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(224,240,255,0.4);font-family:'Orbitron',monospace; }
.info-box .val { font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#00cc66; }
.diff-btns { display:flex;gap:8px; }
.diff-btn { background:transparent;border:1px solid rgba(0,200,100,0.3);color:rgba(0,200,100,0.7);
  padding:8px 14px;border-radius:8px;font-family:'Orbitron',monospace;font-size:11px;
  cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px; }
.diff-btn:hover,.diff-btn.active { background:rgba(0,200,100,0.15);border-color:#00cc66;color:#00cc66; }
.new-btn { background:#00cc66;color:#000;border:none;padding:10px 18px;border-radius:8px;
  font-family:'Orbitron',monospace;font-size:12px;font-weight:700;cursor:pointer;
  letter-spacing:1px;text-transform:uppercase;transition:opacity .2s; }
.new-btn:hover{opacity:.85}
.board-wrap { position:relative;background:#0a1a10;border-radius:12px;padding:12px;
  border:2px solid rgba(0,200,100,0.2);box-shadow:0 0 30px rgba(0,200,100,0.05);
  margin-bottom:24px; }
#board { display:grid;gap:3px; }
.cell {
  width:36px;height:36px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-family:'Orbitron',monospace;font-weight:900;font-size:14px;
  cursor:pointer;transition:all .1s;user-select:none;
  background:#0d2010;border:1px solid rgba(0,200,100,0.15);
}
.cell:hover:not(.revealed):not(.flagged) { background:#152a18;border-color:rgba(0,200,100,0.4); }
.cell.revealed { background:#060e08;border-color:rgba(0,200,100,0.08);cursor:default; }
.cell.flagged { background:#1a1000;border-color:rgba(255,160,0,0.4); }
.cell.mine-hit { background:#3a0000;border-color:#ff4444; }
.cell.mine-show { background:#1a0a00;border-color:rgba(255,100,0,0.3); }
.n1{color:#4af;} .n2{color:#4f8;} .n3{color:#f84;} .n4{color:#a4f;}
.n5{color:#f44;} .n6{color:#4ff;} .n7{color:#f4f;} .n8{color:#aaa;}
.overlay { position:absolute;inset:0;border-radius:12px;background:rgba(5,7,0,0.9);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  backdrop-filter:blur(4px); }
.overlay.show{display:flex}
.overlay h2 { font-family:'Orbitron',monospace;font-size:28px;letter-spacing:3px; }
.overlay p { color:rgba(224,240,255,0.6);font-size:16px; }
.win-title{color:#00cc66;} .lose-title{color:#ff4444;}
@media(max-width:450px){ .cell{width:28px;height:28px;font-size:11px;} }
</style>
</head>
<body>
<header>
  <a class="back" href="/games">← Back</a>
  <h1>MINESWEEPER</h1>
</header>
<div class="top-bar">
  <div class="info-box"><div class="label">Mines</div><div class="val" id="mine-count">0</div></div>
  <div class="info-box"><div class="label">Time</div><div class="val" id="timer">0</div></div>
  <div class="diff-btns">
    <button class="diff-btn active" onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn" onclick="setDiff('medium')">Med</button>
    <button class="diff-btn" onclick="setDiff('hard')">Hard</button>
  </div>
  <button class="new-btn" onclick="newGame()">New</button>
</div>
<div class="board-wrap">
  <div id="board"></div>
  <div class="overlay show" id="overlay">
    <h2 class="win-title" id="ov-title">MINESWEEPER</h2>
    <p id="ov-msg">Find all mines without triggering them</p>
    <button class="new-btn" onclick="newGame()">Play</button>
  </div>
</div>

<script>
const DIFFS = {
  easy:   { cols:9,  rows:9,  mines:10 },
  medium: { cols:16, rows:16, mines:40 },
  hard:   { cols:30, rows:16, mines:99 },
};
let diff = 'easy', cfg = DIFFS[diff];
let grid, revealed, flagged, minesLeft, gameOver, firstClick, timerVal, timerInt;

function setDiff(d) {
  diff = d; cfg = DIFFS[d];
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().startsWith(d.slice(0,3))));
  newGame();
}

function newGame() {
  clearInterval(timerInt);
  timerVal = 0; gameOver = false; firstClick = true;
  minesLeft = cfg.mines;
  grid = Array.from({length:cfg.rows}, () => Array(cfg.cols).fill(0));
  revealed = Array.from({length:cfg.rows}, () => Array(cfg.cols).fill(false));
  flagged  = Array.from({length:cfg.rows}, () => Array(cfg.cols).fill(false));
  document.getElementById('mine-count').textContent = minesLeft;
  document.getElementById('timer').textContent = '0';
  document.getElementById('overlay').classList.remove('show');
  renderBoard();
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < cfg.mines) {
    const r = Math.floor(Math.random() * cfg.rows);
    const c = Math.floor(Math.random() * cfg.cols);
    if (grid[r][c] === -1) continue;
    if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
    grid[r][c] = -1; placed++;
  }
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (grid[r][c] !== -1)
        grid[r][c] = neighbors(r, c).filter(([nr,nc]) => grid[nr][nc] === -1).length;
}

function neighbors(r, c) {
  const res = [];
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols) res.push([nr,nc]);
    }
  return res;
}

function reveal(r, c) {
  if (revealed[r][c] || flagged[r][c]) return;
  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    timerInt = setInterval(() => {
      timerVal++;
      document.getElementById('timer').textContent = timerVal;
    }, 1000);
  }
  revealed[r][c] = true;
  if (grid[r][c] === -1) {
    showLose(r, c); return;
  }
  if (grid[r][c] === 0)
    neighbors(r, c).forEach(([nr,nc]) => reveal(nr, nc));
  renderBoard();
  checkWin();
}

function flag(r, c) {
  if (revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  minesLeft += flagged[r][c] ? -1 : 1;
  document.getElementById('mine-count').textContent = minesLeft;
  renderBoard();
}

function showLose(hitR, hitC) {
  gameOver = true;
  clearInterval(timerInt);
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (grid[r][c] === -1) revealed[r][c] = true;
  renderBoard();
  const cell = document.querySelector(`[data-r="${hitR}"][data-c="${hitC}"]`);
  if (cell) cell.classList.add('mine-hit');
  setTimeout(() => {
    document.getElementById('ov-title').textContent = '💥 BOOM';
    document.getElementById('ov-title').className = 'lose-title';
    document.getElementById('ov-msg').textContent = 'Time: ' + timerVal + 's';
    document.getElementById('overlay').classList.add('show');
  }, 400);
}

function checkWin() {
  const total = cfg.rows * cfg.cols;
  let rev = 0;
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (revealed[r][c]) rev++;
  if (rev === total - cfg.mines) {
    gameOver = true;
    clearInterval(timerInt);
    setTimeout(() => {
      document.getElementById('ov-title').textContent = '✓ CLEARED';
      document.getElementById('ov-title').className = 'win-title';
      document.getElementById('ov-msg').textContent = 'Time: ' + timerVal + 's';
      document.getElementById('overlay').classList.add('show');
    }, 200);
  }
}

function renderBoard() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
  board.innerHTML = '';
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      const d = document.createElement('div');
      d.className = 'cell';
      d.dataset.r = r; d.dataset.c = c;
      if (revealed[r][c]) {
        d.classList.add(grid[r][c] === -1 ? 'mine-show' : 'revealed');
        if (grid[r][c] === -1) d.textContent = '💣';
        else if (grid[r][c] > 0) { d.textContent = grid[r][c]; d.classList.add('n'+grid[r][c]); }
      } else if (flagged[r][c]) {
        d.classList.add('flagged');
        d.textContent = '🚩';
      }
      d.addEventListener('click', () => { if (!gameOver) reveal(r, c); });
      d.addEventListener('contextmenu', e => { e.preventDefault(); if (!gameOver) flag(r, c); });
      // Long press for mobile flag
      let pressTimer;
      d.addEventListener('touchstart', () => { pressTimer = setTimeout(() => { if (!gameOver) flag(r, c); renderBoard(); }, 400); }, {passive:true});
      d.addEventListener('touchend', () => clearTimeout(pressTimer), {passive:true});
      board.appendChild(d);
    }
  }
}

newGame();
</script>
</body>
</html>
