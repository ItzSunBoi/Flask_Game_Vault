<!DOCTYPE html><html lang="en"><head><script src="/http-socket.js"></script><script src="/multiplayer-common.js"></script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vault Mafia — Vault Atlas</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet"><style>body{background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;margin:0}header{padding:14px 22px;border-bottom:1px solid rgba(0,255,170,.2);display:flex;gap:12px;align-items:center}.back{color:#00ffaa;text-decoration:none;font-family:'Orbitron',monospace;font-size:12px}h1{font-family:'Orbitron',monospace;font-size:18px;color:#00ffaa;margin:0}.panel{max-width:900px;margin:24px auto;background:#0d1426;border:1px solid rgba(0,255,170,.18);border-radius:14px;padding:16px}.player{display:inline-block;padding:8px 12px;margin:5px;border:1px solid rgba(0,255,170,.25);border-radius:8px;cursor:pointer}</style></head><body><header><a class="back" href="/vault">← Back</a><h1>Vault Mafia Lite</h1></header><div class="panel"><div id="role">Role: ?</div><div id="phase">Phase: ?</div><div id="players"></div></div><script>const {roomId,playerName}=GameVaultMP.normalizeMultiplayerParams({defaultName:'Player'});const ws=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws');ws.onopen=()=>ws.send(JSON.stringify({type:'join',room:roomId,name:playerName,game:'mafia'}));ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='joined'&&m.isHost)ws.send(JSON.stringify({type:'start_game'}));if(m.type==='mafia_state'){document.getElementById('role').textContent='Role: '+m.role;document.getElementById('phase').textContent='Phase: '+m.phase;const p=document.getElementById('players');p.innerHTML='';(m.players||[]).forEach(pl=>{const alive=m.alive?.[pl.id];const d=document.createElement('div');d.className='player';d.textContent=pl.name+(alive?'':' (out)');if(alive)d.onclick=()=>ws.send(JSON.stringify({type:'mafia_vote',target:pl.id}));p.appendChild(d);});}if(m.type==='game_over')alert(`Winner: ${m.winner}`)};</script></body></html>
