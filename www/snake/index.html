<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var key = 'urlmask:' + location.pathname;
  var token = sessionStorage.getItem(key);
  if (!token) {
    token = Math.random().toString(36).substr(2,10);
    sessionStorage.setItem(key, token);
  }
  // Keep vaultTokenMap updated so /x/ redirects work too
  try {
    var map = JSON.parse(sessionStorage.getItem('vaultTokenMap') || '{}');
    map[token] = location.pathname + location.search;
    sessionStorage.setItem('vaultTokenMap', JSON.stringify(map));
  } catch(e) {}
  // Only rewrite if not already on /x/
  if (location.pathname !== '/x/') {
    history.replaceState(null, '', '/x/?t=' + token);
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vault Serpent — Vault Atlas</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
  header{width:100%;padding:16px 24px;border-bottom:1px solid rgba(0,221,187,0.2);display:flex;align-items:center;gap:16px;}
  .back{color:rgba(0,221,187,0.7);text-decoration:none;font-size:13px;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',monospace;}
  header h1{font-family:'Orbitron',monospace;font-size:20px;color:#00ddbb;letter-spacing:3px;}
  .top{display:flex;gap:16px;margin:16px;align-items:center;}
  .score-box{background:#0d1426;border:1px solid rgba(0,221,187,0.2);border-radius:10px;padding:10px 20px;text-align:center;min-width:90px;}
  .score-box .label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(224,240,255,0.4);font-family:'Orbitron',monospace;}
  .score-box .val{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#00ddbb;}
  canvas{border:2px solid rgba(0,221,187,0.3);border-radius:6px;display:block;box-shadow:0 0 24px rgba(0,221,187,0.1);}
  .wrap{position:relative;}
  .overlay{position:absolute;inset:0;background:rgba(5,7,15,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-radius:6px;}
  .overlay h2{font-family:'Orbitron',monospace;font-size:26px;color:#00ddbb;letter-spacing:3px;}
  .overlay p{color:rgba(224,240,255,0.6);font-size:15px;}
  .btn{background:#00ddbb;color:#000;border:none;padding:11px 22px;border-radius:8px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:opacity .2s;}
  .btn:hover{opacity:.85}
  .d-pad{display:none;grid-template-columns:repeat(3,60px);gap:8px;margin-top:16px;}
  @media(max-width:600px){.d-pad{display:grid;}}
  .dp{background:#0d1426;border:1px solid rgba(0,221,187,0.2);border-radius:8px;height:50px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;user-select:none;-webkit-user-select:none;}
  .dp:active{background:rgba(0,221,187,0.1);}
  .leaderboard{margin:16px;width:100%;max-width:360px;}
  .lb-title{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(224,240,255,0.3);margin-bottom:10px;}
  .lb-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:14px;}
  .lb-rank{font-family:'Orbitron',monospace;font-size:11px;color:rgba(0,221,187,0.5);width:20px;}
  .lb-score{margin-left:auto;font-family:'Orbitron',monospace;font-size:13px;color:#00ddbb;}
</style>
</head>
<body>
<header>
  <a class="back" href="/vault">← Back</a>
  <h1>VAULT SERPENT</h1>
</header>
<div class="top">
  <div class="score-box"><div class="label">Score</div><div class="val" id="score">0</div></div>
  <div class="score-box"><div class="label">Best</div><div class="val" id="best">0</div></div>
  <div class="score-box"><div class="label">Level</div><div class="val" id="level">1</div></div>
</div>
<div class="wrap">
  <canvas id="c" width="360" height="360"></canvas>
  <div class="overlay" id="overlay">
    <h2>VAULT SERPENT</h2>
    <p>Arrow keys or swipe to move</p>
    <button class="btn" onclick="beginSequence()">Play</button>
  </div>
</div>
<div class="d-pad">
  <div></div><div class="dp" id="dup">▲</div><div></div>
  <div class="dp" id="dleft">◀</div><div></div><div class="dp" id="dright">▶</div>
  <div></div><div class="dp" id="ddown">▼</div><div></div>
</div>
<div class="leaderboard">
  <div class="lb-title">High Scores</div>
  <div id="lb-list"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const GRID = 18, CELL = 20, W = GRID, H = GRID;
let snake, dir, nextDir, food, score, level, running, raf, speed;
const best = () => parseInt(localStorage.getItem('snake_best') || '0');

function beginSequence() {
  snake = [{x:9,y:9},{x:8,y:9},{x:7,y:9}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  food = spawnFood(); score = 0; level = 1; speed = 180; running = true;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('best').textContent = best();
  cancelAnimationFrame(raf); sequenceLoop(0);
}

function spawnFood() {
  let f;
  do { f = {x:Math.floor(Math.random()*W), y:Math.floor(Math.random()*H)}; }
  while (snake.some(s => s.x===f.x && s.y===f.y));
  return f;
}

let lastTime = 0;
function sequenceLoop(ts) {
  raf = requestAnimationFrame(sequenceLoop);
  if (ts - lastTime < speed) return;
  lastTime = ts;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  // Wall collision
  if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) { closeSequence(); return; }
  // Self collision
  if (snake.some(s => s.x===head.x && s.y===head.y)) { closeSequence(); return; }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    level = Math.floor(score / 100) + 1;
    speed = Math.max(60, 180 - (level-1)*18);
    food = spawnFood();
  } else { snake.pop(); }
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  draw();
}

function draw() {
  ctx.fillStyle = '#05070f'; ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid dots
  ctx.fillStyle = 'rgba(0,221,187,0.04)';
  for(let x=0;x<W;x++) for(let y=0;y<H;y++) ctx.fillRect(x*CELL+9,y*CELL+9,2,2);
  // Food
  ctx.fillStyle = '#ff4488';
  ctx.shadowBlur = 12; ctx.shadowColor = '#ff4488';
  ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Vault Serpent
  snake.forEach((s, i) => {
    const alpha = 1 - (i / snake.length) * 0.5;
    ctx.fillStyle = i===0 ? '#00ffcc' : `rgba(0,${Math.floor(180-i*2)},${Math.floor(170-i*2)},${alpha})`;
    if (i === 0) { ctx.shadowBlur = 10; ctx.shadowColor = '#00ddbb'; }
    const r = i === 0 ? 5 : 4;
    roundRect(ctx, s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, r);
    ctx.shadowBlur = 0;
  });
}

function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();c.fill();}

function closeSequence() {
  running = false; cancelAnimationFrame(raf);
  if (score > best()) localStorage.setItem('snake_best', score);
  renderArchiveLedger();
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `<h2>SEQUENCE CLOSED</h2><p>Score: ${score}</p><button class="btn" onclick="beginSequence()">Play Again</button>`;
}

function renderArchiveLedger() {
  const b = best();
  document.getElementById('best').textContent = b;
  const scores = JSON.parse(localStorage.getItem('snake_scores') || '[]');
  const name = localStorage.getItem('playerName') || 'Anonymous';
  if (score > 0) {
    scores.push({name, score}); scores.sort((a,b)=>b.score-a.score);
    localStorage.setItem('snake_scores', JSON.stringify(scores.slice(0,10)));
  }
  document.getElementById('lb-list').innerHTML = scores.slice(0,8).map((s,i) =>
    `<div class="lb-row"><span class="lb-rank">${i+1}</span><span>${s.name}</span><span class="lb-score">${s.score}</span></div>`
  ).join('') || '<div class="lb-row" style="color:rgba(224,240,255,0.3)">No scores yet</div>';
}

const DIRS = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
document.addEventListener('keydown', e => {
  if (!running) return;
  const d = DIRS[e.key];
  if (d && !(d.x === -dir.x && d.y === -dir.y)) { nextDir = d; e.preventDefault(); }
});

document.getElementById('dup').onclick = () => { if(running&&dir.y!==1)nextDir={x:0,y:-1}; };
document.getElementById('ddown').onclick = () => { if(running&&dir.y!==-1)nextDir={x:0,y:1}; };
document.getElementById('dleft').onclick = () => { if(running&&dir.x!==1)nextDir={x:-1,y:0}; };
document.getElementById('dright').onclick = () => { if(running&&dir.x!==-1)nextDir={x:1,y:0}; };

let sx,sy;
canvas.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(!running||Math.abs(dx)<15&&Math.abs(dy)<15)return;
  if(Math.abs(dx)>Math.abs(dy)){const d=dx>0?{x:1,y:0}:{x:-1,y:0};if(!(d.x===-dir.x))nextDir=d;}
  else{const d=dy>0?{x:0,y:1}:{x:0,y:-1};if(!(d.y===-dir.y))nextDir=d;}
});

renderArchiveLedger();
ctx.fillStyle='#05070f';ctx.fillRect(0,0,canvas.width,canvas.height);
</script>
</body>
</html>
